<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Concursos</title>
        <script>
          if (location.pathname === '/' || location.pathname === '/index.html') {
            location.replace('/home.html');
          }
        </script>
    </head>
    <body>
        <noscript>Você precisa habilitar o JavaScript para acessar este site.</noscript>
        <div id="root"></div>
    
<script>
(function(){
  try {
    if (!sessionStorage.getItem('__access_tracked')){
      sessionStorage.setItem('__access_tracked','1');
      var url = (typeof location !== 'undefined') ? location.href : '';
      fetch('/api/track/access',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({extra:{page:'home', url:url}})}).catch(function(){});
    }
  } catch(e){}
})();
</script>
</body>
</html>
